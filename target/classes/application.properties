spring.application.name=shortlinkpro

# Server Configuration
server.port=8080

# Database Configuration: Default to H2 In-Memory for easy out-of-the-box running
spring.datasource.url=jdbc:h2:mem:shortlinkpro;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Production MySQL settings (uncomment to connect to MySQL database)
# spring.datasource.url=jdbc:mysql://localhost:3306/shortlinkpro?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=root

# JPA Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# SQL Init configuration
spring.sql.init.mode=always

# Spring Security Config to allow frame options for H2 Console
spring.h2.console.settings.web-allow-others=false

# Jackson configuration
spring.jackson.serialization.write-dates-as-timestamps=false
