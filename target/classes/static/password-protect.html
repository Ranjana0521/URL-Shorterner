<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Link Verification - ShortLink Pro</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-hero);
            position: relative;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="hero-shape hero-shape-1"></div>
        <div class="hero-shape hero-shape-2"></div>

        <div class="container position-relative z-1">
            <div class="row justify-content-center">
                <div class="col-md-5 text-center">
                    <div class="mb-4">
                        <span class="sidebar-brand text-decoration-none d-inline-block">
                            <i class="fas fa-lock text-danger me-2"></i>ShortLink Pro
                        </span>
                        <h4 class="mt-3 font-weight-bold">Password Required</h4>
                        <p class="text-secondary small">This short link is encrypted. Enter password to view.</p>
                    </div>

                    <div class="glass-panel p-4 p-md-5 shadow-lg text-start">
                        <form id="url-password-form">
                            <div class="mb-4">
                                <label for="url-password" class="form-label text-secondary small fw-semibold">Enter Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0 text-muted" style="border-color: var(--border-color);"><i class="fas fa-key"></i></span>
                                    <input type="password" class="form-control bg-transparent border-start-0 text-primary" id="url-password" placeholder="••••••••" required style="border-color: var(--border-color); color: var(--text-primary);">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-premium w-100 py-2.5 fw-semibold mb-2">
                                <i class="fas fa-unlock me-2"></i>Unlock Link
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core App JS -->
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('url-password-form');
            const urlParams = new URLSearchParams(window.location.search);
            const shortCode = urlParams.get('code');

            if (!shortCode) {
                App.showToast('Invalid redirection code.', 'danger');
                setTimeout(() => window.location.href = '/index.html', 1500);
                return;
            }

            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const password = document.getElementById('url-password').value;

                    try {
                        const res = await App.fetchApi(`/r/${shortCode}/auth`, {
                            method: 'POST',
                            body: JSON.stringify({ password: password })
                        });

                        if (res.ok) {
                            const data = await res.json();
                            App.showToast('Unlocking and redirecting...');
                            setTimeout(() => {
                                window.location.href = data.originalUrl;
                            }, 1000);
                        } else {
                            const errData = await res.json();
                            App.showToast(errData.error || 'Incorrect password.', 'danger');
                        }
                    } catch (err) {
                        App.showToast('Connection error. Please try again.', 'danger');
                    }
                });
            }
        });
    </script>
</body>
</html>
