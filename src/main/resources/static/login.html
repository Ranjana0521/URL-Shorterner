<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - ShortLink Pro</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-hero);
            position: relative;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="hero-shape hero-shape-1"></div>
        <div class="hero-shape hero-shape-2"></div>
        
        <!-- Theme Toggle Positioned in corner -->
        <div class="position-absolute top-0 end-0 p-4">
            <button class="theme-toggle" id="theme-toggle-btn" aria-label="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
        </div>

        <div class="container position-relative z-1">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="text-center mb-4">
                        <a href="/index.html" class="sidebar-brand text-decoration-none d-inline-block">
                            <i class="fas fa-link me-2"></i>ShortLink Pro
                        </a>
                        <h4 class="mt-3 font-weight-bold">Welcome Back</h4>
                        <p class="text-secondary small">Enter credentials to manage your dashboard.</p>
                    </div>

                    <div class="glass-panel p-4 p-md-5 shadow-lg">
                        <form id="login-form">
                            <div class="mb-3">
                                <label for="username" class="form-label text-secondary small fw-semibold">Username or Email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0 text-muted" style="border-color: var(--border-color);"><i class="fas fa-user"></i></span>
                                    <input type="text" class="form-control bg-transparent border-start-0 text-primary" id="username" placeholder="demo" required style="border-color: var(--border-color); color: var(--text-primary);">
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <div class="d-flex justify-content-between mb-2">
                                    <label for="password" class="form-label text-secondary small fw-semibold m-0">Password</label>
                                    <a href="/forgot-password.html" class="small text-primary text-decoration-none">Forgot?</a>
                                </div>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0 text-muted" style="border-color: var(--border-color);"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control bg-transparent border-start-0 text-primary" id="password" placeholder="••••••••" required style="border-color: var(--border-color); color: var(--text-primary);">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-premium w-100 py-2.5 fw-semibold mb-3">
                                <i class="fas fa-sign-in-alt me-2"></i>Sign In
                            </button>
                            
                            <div class="text-center text-secondary small">
                                Don't have an account? <a href="/register.html" class="text-primary text-decoration-none fw-bold">Sign Up</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core App JS -->
    <script src="/js/app.js"></script>
    <!-- Auth API Handler -->
    <script src="/js/auth.js"></script>
</body>
</html>
